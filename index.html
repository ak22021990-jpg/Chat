const DATASET_BUCKET_MAP = {
  racial_ethnic: 'racial',
  sexual_explicit: 'sexual',
  hate_speech: 'hate',
  harassment_bullying: 'harassment',
  emoji_abuse: 'emoji',
  other_ambiguous: 'other',
};

const USER_COLORS = ['#3b82f6','#10b981','#a855f7','#f97316','#ec4899','#f59e0b','#00e5ff','#ef4444','#84cc16','#8b5cf6'];

function normalizeExternalDatasets(rows) {
  if(!Array.isArray(rows)) return null;
  const levels = ['low', 'medium', 'high'];
  const groupedMessages = { low: [], medium: [], high: [] };
  const groupedUsers = { low: [], medium: [], high: [] };
  const userIndex = { low: new Map(), medium: new Map(), high: new Map() };

  const getUserIndex = (level, name) => {
    const normalizedName = (name || 'UnknownUser').trim() || 'UnknownUser';
    const existing = userIndex[level].get(normalizedName);
    if(existing !== undefined) return existing;
    const idx = groupedUsers[level].length;
    groupedUsers[level].push({ name: normalizedName, color: USER_COLORS[idx % USER_COLORS.length] });
    userIndex[level].set(normalizedName, idx);
    return idx;
  };

  rows.forEach((row, i) => {
    const level = String(row.level || '').toLowerCase();
    if(!levels.includes(level)) return;
    const mappedBuckets = (Array.isArray(row.ground_truth_buckets) ? row.ground_truth_buckets : [])
      .map(b => DATASET_BUCKET_MAP[b] || 'other')
      .filter((b, idx, arr) => arr.indexOf(b) === idx);
    const user = getUserIndex(level, row.simulated_user);
    groupedMessages[level].push({
      id: String(row.message_id || `${level}-${i + 1}`),
      panel: Math.max(0, (Number(row.chat_id) || 1) - 1) % 3,
      user,
      userName: groupedUsers[level][user].name,
      text: String(row.message_text || ''),
      t: Math.max(0, Number(row.timestamp_offset) || 0),
      buckets: mappedBuckets,
    });
  });

  return levels.reduce((acc, level) => {
    const messages = groupedMessages[level].sort((a,b) => a.t - b.t);
    acc[level] = {
      violations: messages.filter(m => m.buckets.length > 0).length,
      messages,
      users: groupedUsers[level].length ? groupedUsers[level] : USERS[level],
    };
    return acc;
  }, {});
}

function getDatasetsWithExternalFallback(rows) {
  const parsed = normalizeExternalDatasets(rows);
  if(!parsed) return DATASETS;
  return ['low','medium','high'].reduce((acc, level) => {
    acc[level] = parsed[level]?.messages?.length ? parsed[level] : DATASETS[level];
    return acc;
  }, {});
}

function getViolationCount(dataset, fallbackCount = 0) {
  if(dataset?.messages?.length) {
    return dataset.messages.filter(m => Array.isArray(m.buckets) && m.buckets.length > 0).length;
  }
  return typeof dataset?.violations === 'number' ? dataset.violations : fallbackCount;
}


// ─── SCORING ENGINE ───────────────────────────────────────────────────────────
const SCORE_CORRECT_FLAG = 10;
const SCORE_CORRECT_BUCKET = 10;
const SCORE_WRONG_BUCKET = -10;
const SCORE_FALSE_POSITIVE = -5;
const SCORE_MISSED = -5;
const SCORE_PERFECT_BONUS = 25;
const FLAG_COOLDOWN = 500;
const SESSION_DURATION_SECONDS = 180;
const CLASSIFIER_OPEN_EVENT = 'modwatch_classifier_open';

function scoringReducer(state, action) {
  switch(action.type) {
    case 'FLAG_MESSAGE': {
      const { messageId, selectedBuckets, message, timestamp } = action;
      if(state.flagged[messageId]) return state; // already flagged
      const groundTruth = message.buckets;
      const isViolation = groundTruth.length > 0;
      let delta = 0;
      let result = '';
      if(isViolation) {
        delta += SCORE_CORRECT_FLAG;
        selectedBuckets.forEach(b => {
          if(groundTruth.includes(b)) { delta += SCORE_CORRECT_BUCKET; }
          else delta += SCORE_WRONG_BUCKET;
        });
        const allGroundTruthSelected = groundTruth.every(b => selectedBuckets.includes(b));
        const noWrongSelection = selectedBuckets.every(b => groundTruth.includes(b));
        result = allGroundTruthSelected && noWrongSelection ? 'correct' : 'incorrect';
      } else {
        delta += SCORE_FALSE_POSITIVE;
        selectedBuckets.forEach(() => { delta += SCORE_WRONG_BUCKET; });
        result = 'incorrect';
      }
      const responseTime = timestamp - (message.t * 1000);
      return {
        ...state,
        score: state.score + delta,
        flagged: { ...state.flagged, [messageId]: { selectedBuckets, result, delta, groundTruth, responseTime } },
        events: [...state.events, { type:'message_flagged', messageId, selectedBuckets, groundTruth, delta, result, timestamp }],
        lastDelta: { value: delta, id: messageId, ts: Date.now() },

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dd = String(date.getDate()).padStart(2, '0');

}
function readAny(obj, keys, fallback = '') {

  }

}
function normalizeInboundLeaderboardRow(row) {

function mergeLeaderboardRows(rows) {

}
function upsertLocalLeaderboard(row) {

function getRemoteLeaderboardCache() {

}
function getFreshRemoteLeaderboardCache(maxAgeMs = REMOTE_LEADERBOARD_CACHE_TTL_MS) {

}
function setRemoteLeaderboardCache(rows) {

}
let leaderboardPrefetchPromise = null;
function warmLeaderboardCache(limit = 200) {
  if(leaderboardPrefetchPromise) return leaderboardPrefetchPromise;
  leaderboardPrefetchPromise = fetchLeaderboardRows(limit)
    .then(rows => {
      if(Array.isArray(rows) && rows.length) setRemoteLeaderboardCache(rows);
      return Array.isArray(rows) ? rows : [];

function getPendingSubmissions() {

  catch { return []; }
}

}
function getSubmissionRowKey(row) {
  const clean = sanitizeLeaderboardRow(row);
  return [clean.email, clean.level, clean.score, clean.date].join('|');
}
function queuePendingSubmission(row) {
  const clean = sanitizeLeaderboardRow(row);
  if(!clean.email) return;
  const pending = getPendingSubmissions();
  const key = getSubmissionRowKey(clean);
  if(!pending.some(existing => getSubmissionRowKey(existing) === key)) {
    pending.push(clean);
    setPendingSubmissions(pending);
  }
}
function removePendingSubmission(row) {
  const key = getSubmissionRowKey(row);
  const next = getPendingSubmissions().filter(existing => getSubmissionRowKey(existing) !== key);
  setPendingSubmissions(next);
}
function postLeaderboardNoCors(row) {
  if(!APPS_SCRIPT_WEB_APP_URL) return Promise.resolve(false);
  return fetch(APPS_SCRIPT_WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'add', row: sanitizeLeaderboardRow(row) }),
  }).then(() => true).catch(() => false);
}
function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
async function postLeaderboardWithRetry(row, maxAttempts = SCORE_SYNC_RETRIES) {
  for(let attempt = 1; attempt <= maxAttempts; attempt++) {
    const ok = await postLeaderboardNoCors(row);
    if(ok) return true;
    if(attempt < maxAttempts) await wait(SCORE_SYNC_RETRY_DELAY_MS * attempt);
  }
  return false;
}
async function submitLeaderboardRow(row) {
  const clean = sanitizeLeaderboardRow(row);
  if(!clean.email) return false;
  queuePendingSubmission(clean);
  const ok = await postLeaderboardWithRetry(clean);
  if(ok) removePendingSubmission(clean);
  return ok;
}
async function flushPendingSubmissions() {
  const pending = getPendingSubmissions();
  for(const row of pending) {
    const ok = await postLeaderboardWithRetry(row);
    if(ok) removePendingSubmission(row);
  }
  return getPendingSubmissions().length;
}
function extractRowsFromPayload(payload) {
  if(Array.isArray(payload)) return payload;
  if(Array.isArray(payload?.rows)) return payload.rows;
  if(Array.isArray(payload?.data)) return payload.data;
  if(Array.isArray(payload?.values)) return payload.values;
  if(Array.isArray(payload?.result)) return payload.result;
  return [];
}
function fetchLeaderboardJsonp(limit = 100) {
  if(!APPS_SCRIPT_WEB_APP_URL) return Promise.resolve([]);
  return new Promise((resolve, reject) => {
    const callback = `modwatch_jsonp_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
    const script = document.createElement('script');
    const cleanup = () => {
      if(script.parentNode) script.parentNode.removeChild(script);
      try { delete window[callback]; } catch { window[callback] = undefined; }
    };
    window[callback] = (payload) => {
      cleanup();
      resolve(extractRowsFromPayload(payload));
    };
    script.onerror = () => {
      cleanup();
      reject(new Error('Failed to load leaderboard JSONP'));
    };
    script.src = `${APPS_SCRIPT_WEB_APP_URL}?action=list&limit=${encodeURIComponent(limit)}&callback=${encodeURIComponent(callback)}&jsonp=${encodeURIComponent(callback)}`;
    document.body.appendChild(script);
  });
}
async function fetchLeaderboardRows(limit = 100) {
  if(!APPS_SCRIPT_WEB_APP_URL) return [];
  const url = `${APPS_SCRIPT_WEB_APP_URL}?action=list&limit=${encodeURIComponent(limit)}`;
  try {
    const res = await fetch(url, { method:'GET' });
    if(res.ok) {
      const text = await res.text();
      if(text) {
        try {
          return extractRowsFromPayload(JSON.parse(text));
        } catch(_) {
          const callbackMatch = text.match(/^[\w$]+\(([\s\S]*)\)\s*;?\s*$/);
          if(callbackMatch?.[1]) {
            try { return extractRowsFromPayload(JSON.parse(callbackMatch[1])); }
            catch(_) {}
          }
        }
      }
    }
  } catch(_) {}
  return fetchLeaderboardJsonp(limit);
}

// Floating Bucket Panel
function BucketPanel({ message, position, onConfirm, onClose }) {
  const [selected, setSelected] = useState([]);
  const panelRef = useRef(null);
  const [panelPos, setPanelPos] = useState({ x: position.x, y: position.y });

  const toggle = (id) => setSelected(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);

  const recalcPanelPosition = useCallback(() => {
    const margin = 12;
    const panelWidth = 270;
    const panelHeight = panelRef.current?.offsetHeight || 360;
    const clampedX = Math.min(
      Math.max(margin, position.x),
      Math.max(margin, window.innerWidth - panelWidth - margin)
    );
    const clampedY = Math.min(
      Math.max(margin, position.y),
      Math.max(margin, window.innerHeight - panelHeight - margin)
    );
    setPanelPos({ x: clampedX, y: clampedY });
  }, [position.x, position.y]);

  useEffect(() => {
    const handleClick = (e) => {
      if(!e.target.closest('.bucket-panel')) onClose();
    };
    setTimeout(() => document.addEventListener('click', handleClick), 100);
    return () => document.removeEventListener('click', handleClick);
  }, [onClose]);

  useLayoutEffect(() => {
    recalcPanelPosition();
  }, [recalcPanelPosition, selected.length]);

  useEffect(() => {
    const onResize = () => recalcPanelPosition();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [recalcPanelPosition]);

  return (
    <div ref={panelRef} className="bucket-panel" style={{
      position:'fixed',
      top: panelPos.y,
      left: panelPos.x,
      width:270,
      background:'var(--surface)',border:'1px solid var(--border-bright)',

        <div style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)',lineHeight:1.4,wordBreak:'break-word'}}>
          "{message.text.slice(0,60)}{message.text.length > 60 ? '…' : ''}"
        </div>
      </div>
      <div style={{padding:12,display:'flex',flexDirection:'column',gap:6}}>
        {BUCKETS.map(b => {
          const isSelected = selected.includes(b.id);
          return (
            <div
              key={b.id}
              onClick={() => toggle(b.id)}
              style={{
                display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
                borderRadius:8,cursor:'pointer',

              </div>
              <span style={{fontSize:13,color: isSelected ? b.color : 'var(--text)',fontWeight: isSelected ? 600 : 400}}>{b.label}</span>
            </div>

  useEffect(() => {
    const handleClassifierOpen = (e) => {
      const openedMessageId = e?.detail?.messageId;
      if(openedMessageId !== msg.id) setPanelPos(null);
    };
    window.addEventListener(CLASSIFIER_OPEN_EVENT, handleClassifierOpen);
    return () => window.removeEventListener(CLASSIFIER_OPEN_EVENT, handleClassifierOpen);
  }, [msg.id]);

  const handleClick = (e) => {
    if(flaggedInfo || isLocked) return;
    e.stopPropagation();
    window.dispatchEvent(new CustomEvent(CLASSIFIER_OPEN_EVENT, { detail: { messageId: msg.id } }));
    const rect = e.currentTarget.getBoundingClientRect();

// Game Session
function GameSession({ level, player, dataset, onEnd }) {
  const [state, dispatch] = useReducer(scoringReducer, null, initScoringState);
  const [visibleMessages, setVisibleMessages] = useState({ 0:[], 1:[], 2:[] });
  const [isLocked, setIsLocked] = useState(false);
  const [showEarlyModal, setShowEarlyModal] = useState(false);
  const [sessionStart] = useState(Date.now());
  const timerRef = useRef();
  const lastFlagTime = useRef(0);

  const users = dataset?.users?.length ? dataset.users : USERS[level];
  const totalViolations = dataset.violations;
  const allMessages = dataset.messages;
  const revealWindowSeconds = Math.max(10, SESSION_DURATION_SECONDS - 8);
  const maxMessageTime = allMessages.reduce((max, msg) => Math.max(max, Number(msg.t) || 0), 0);

  // Message reveal engine
  useEffect(() => {
    const intervals = [];
    allMessages.forEach(msg => {
      const normalizedT = Math.max(0, Number(msg.t) || 0);
      const delay = maxMessageTime > 0
        ? Math.round((normalizedT / maxMessageTime) * revealWindowSeconds * 1000)
        : 0;
      const t = setTimeout(() => {
        if(!isLocked) {
          setVisibleMessages(prev => ({
            ...prev,
            [msg.panel]: [...(prev[msg.panel] || []), msg]
          }));
        }
      }, delay);
      intervals.push(t);
    });
    return () => intervals.forEach(clearTimeout);
  }, [allMessages, isLocked, maxMessageTime, revealWindowSeconds]);

  // Timer
  useEffect(() => {
    timerRef.current = setInterval(() => dispatch({ type:'TICK' }), 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  // Check timer end
  useEffect(() => {
    if(state.timeLeft <= 0 && !isLocked) {
      setIsLocked(true);
      clearInterval(timerRef.current);
      setTimeout(() => endSession(false), 800);
    }
  }, [state.timeLeft]);

  // Check early completion
  useEffect(() => {
    const violationMessages = allMessages.filter(m => m.buckets.length > 0);
    const allFlagged = violationMessages.every(m => state.flagged[m.id] && state.flagged[m.id].result === 'correct');
    if(allFlagged && violationMessages.length > 0 && !isLocked) {
      clearInterval(timerRef.current);
      setShowEarlyModal(true);
    }
  }, [state.flagged]);

  const handleFlag = useCallback((msg, buckets) => {
    const now = Date.now();
    if(now - lastFlagTime.current < FLAG_COOLDOWN) return;
    lastFlagTime.current = now;
    dispatch({ type:'FLAG_MESSAGE', messageId:msg.id, selectedBuckets:buckets, message:msg, timestamp:now });
  }, []);

  const endSession = (earlyCompletion = false) => {
    setIsLocked(true);
    setShowEarlyModal(false);
    clearInterval(timerRef.current);
    // Calculate missed violations
    const violationMessages = allMessages.filter(m => m.buckets.length > 0);
    const missed = violationMessages.filter(m => !state.flagged[m.id]);
    const missedPenalty = missed.length * SCORE_MISSED;
    const perfectBonus = earlyCompletion ? SCORE_PERFECT_BONUS : 0;
    const rawScore = state.score + missedPenalty + perfectBonus;
    const maxRawScore = violationMessages.reduce((sum, m) => {
      return sum + SCORE_CORRECT_FLAG + (m.buckets.length * SCORE_CORRECT_BUCKET);
    }, 0) + SCORE_PERFECT_BONUS;
    const finalScore = Math.round((Math.max(0, rawScore) / Math.max(1, maxRawScore)) * 100);

    onEnd({
      score: finalScore,
      baseScore: rawScore,
      rawScore,
      maxRawScore,
      missedCount: missed.length,
      missedPenalty,
      perfectBonus,
      correctFlags: state.correctFlags,
      incorrectFlags: state.incorrectFlags,
      flagged: state.flagged,
      events: state.events,
      earlyCompletion,
      sessionStart,
      sessionEnd: Date.now(),
      totalViolations,
      allMessages,
      allUsers: users,
    });
  };

  const panels = [
    { title:'#general-chaos', idx:0 },
    { title:'#ranked-lobby', idx:1 },
    { title:'#team-comms', idx:2 },
  ];

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
      {/* HUD */}
      <div style={{
        padding:'12px 24px',borderBottom:'1px solid var(--border)',
        display:'flex',alignItems:'center',gap:16,
        background:'var(--surface)',flexShrink:0
      }}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:'auto'}}>
          <div style={{width:28,height:28,background:'var(--accent)',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:900,color:'#000',fontFamily:'var(--font-display)'}}>M</div>
          <span style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:16}}>MODWATCH</span>
          <span style={{
            fontFamily:'var(--font-mono)',fontSize:10,padding:'3px 8px',borderRadius:4,
            background:'rgba(0,229,255,.1)',border:'1px solid rgba(0,229,255,.3)',color:'var(--accent)',
            textTransform:'uppercase',letterSpacing:'.1em'
          }}>{level.toUpperCase()}</span>
        </div>

        <TimerDisplay timeLeft={state.timeLeft} />

        <div style={{
          display:'flex',alignItems:'center',gap:8,
          background:'var(--panel)',border:'1px solid var(--border)',
          borderRadius:10,padding:'10px 18px'
        }}>
          <span style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>SCORE</span>
          <span style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:22,color:'var(--accent)'}}>{state.score}</span>
        </div>

        <div style={{
          display:'flex',gap:12,
          background:'var(--panel)',border:'1px solid var(--border)',
          borderRadius:10,padding:'10px 18px'
        }}>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700,color:'#10b981'}}>{state.correctFlags}</div>
            <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Correct</div>
          </div>
          <div style={{width:1,background:'var(--border)'}}/>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700,color:'#ef4444'}}>{state.incorrectFlags}</div>
            <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>False+</div>
          </div>
        </div>

        <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-muted)'}}>{player.name}</span>
      </div>

      {/* Chat panels */}
      <div style={{
        flex:1,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,
        padding:16,overflow:'hidden'
      }}>
        {panels.map(p => (
          <ChatPanel
            key={p.idx}
            title={p.title}
            messages={visibleMessages[p.idx] || []}
            users={users}
            flaggedMap={state.flagged}
            onFlag={handleFlag}
            isLocked={isLocked}
            panelIdx={p.idx}
          />
        ))}
      </div>

      <ScoreFloat lastDelta={state.lastDelta} />
      {showEarlyModal && <EarlyCompletionModal onEnd={() => endSession(true)} onContinue={() => { setShowEarlyModal(false); /* restart timer? no – just continue */ }} />}
    </div>
  );
}

            <div style={{
              display:'inline-block',marginTop:12,
              background:'rgba(168,85,247,.2)',border:'1px solid rgba(168,85,247,.4)',
              color:'#a855f7',fontFamily:'var(--font-mono)',fontSize:12,
              padding:'6px 16px',borderRadius:20
            }}>⭐ PERFECT SESSION +25 BONUS</div>
          )}
        </div>

        {/* Stats grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
          {[
            { label:'Accuracy', value:`${accuracy}%`, color:'var(--accent)' },
            { label:'Correct Flags', value:correctFlags, color:'#10b981' },
            { label:'False Positives', value:incorrectFlags, color:'#ef4444' },
            { label:'Missed', value:missedCount, color:'#f59e0b' },
          ].map(s => (
            <div key={s.label} style={{
              background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:12,padding:20,textAlign:'center'
            }}>
              <div style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:32,color:s.color}}>{s.value}</div>
              <div style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:4}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Score breakdown */}
        <div style={{
          background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:12,padding:24,marginBottom:24
        }}>
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,marginBottom:16,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>Score Breakdown</div>
          {[
            { label:'Correct flags', value: `+${correctFlags * 10}`, color:'#10b981' },
            { label:'False positives', value: `-${incorrectFlags * 5}`, color:'#ef4444' },
            { label:'Missed violations', value: `${missedPenalty}`, color:'#f59e0b' },
            { label:'Bucket classification', value: `${results.baseScore - correctFlags * 10 + incorrectFlags * 5}`, color:'var(--accent)' },
            ...(perfectBonus ? [{ label:'Perfect session bonus', value:`+${perfectBonus}`, color:'#a855f7' }] : []),
          ].map(item => (
            <div key={item.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:14,color:'var(--text)'}}>{item.label}</span>
              <span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:14,color:item.color}}>{item.value}</span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:12}}>
            <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15}}>Total</span>
            <span style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:24,color:'var(--accent)'}}>{score}</span>
          </div>
        </div>

        {/* Bucket breakdown */}
        <div style={{
          background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:12,padding:24,marginBottom:24
        }}>
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,marginBottom:16,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>Bucket Performance</div>
          {BUCKETS.map(b => {
            const s = bucketStats[b.id];
            const total = s.correct + s.incorrect + s.missed;
            if(!total) return null;
            const pct = total ? Math.round((s.correct / total) * 100) : 0;
            return (
              <div key={b.id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:13,color:b.color,fontWeight:600}}>{b.label}</span>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-muted)'}}>{pct}% ({s.correct}/{total})</span>
                </div>
                <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${pct}%`,background:b.color,borderRadius:3,transition:'width .6s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Violation review */}
        <div style={{
          background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:12,padding:24,marginBottom:32
        }}>
          <button
            onClick={() => setExpanded(expanded === 'review' ? null : 'review')}
            style={{
              width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',
              background:'none',border:'none',cursor:'pointer',color:'var(--text)',
              fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,
              textTransform:'uppercase',letterSpacing:'.1em',color:'var(--text-muted)'
            }}
          >
            <span>Violation Review ({violationMessages.length} total)</span>
            <span>{expanded === 'review' ? '▲' : '▼'}</span>
          </button>
          {expanded === 'review' && (
            <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:10}}>
              {violationMessages.map(msg => {
                const f = flagged[msg.id];
                const user = summaryUsers[msg.user % summaryUsers.length];
                return (
                  <div key={msg.id} style={{
                    padding:14,borderRadius:8,
                    background: f ? (f.result === 'correct' ? 'rgba(16,185,129,.06)' : 'rgba(239,68,68,.06)') : 'rgba(245,158,11,.06)',
                    border: `1px solid ${f ? (f.result === 'correct' ? 'rgba(16,185,129,.2)' : 'rgba(239,68,68,.2)') : 'rgba(245,158,11,.2)'}`
                  }}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <span style={{fontSize:12,fontWeight:700,color:user.color}}>{user.name}</span>
                      <span style={{
                        fontSize:11,padding:'2px 8px',borderRadius:4,fontFamily:'var(--font-mono)',
                        background: f ? (f.result === 'correct' ? 'rgba(16,185,129,.2)' : 'rgba(239,68,68,.2)') : 'rgba(245,158,11,.2)',
                        color: f ? (f.result === 'correct' ? '#10b981' : '#ef4444') : '#f59e0b',
                      }}>
                        {f ? (f.result === 'correct' ? '✓ CAUGHT' : '✗ MISCLASSIFIED') : '◎ MISSED'}
                      </span>
                    </div>
                    <div style={{fontSize:13,lineHeight:1.5,marginBottom:8}}>{msg.text}</div>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>Correct buckets:</span>
                      {msg.buckets.map(bid => {
                        const b = BUCKETS.find(x=>x.id===bid);
                        return b ? <span key={bid} style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:b.bg,color:b.color,border:`1px solid ${b.border}`,fontFamily:'var(--font-mono)'}}>{b.label}</span> : null;
                      })}
                    </div>
                    {f && f.selectedBuckets.length > 0 && (
                      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:6}}>
                        <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>Your selection:</span>
                        {f.selectedBuckets.map(bid => {
                          const b = BUCKETS.find(x=>x.id===bid);
                          const isCorrect = msg.buckets.includes(bid);
                          return b ? <span key={bid} style={{fontSize:11,padding:'2px 8px',borderRadius:20,fontFamily:'var(--font-mono)',background: isCorrect ? b.bg : 'rgba(239,68,68,.15)',color: isCorrect ? b.color : '#ef4444',border:`1px solid ${isCorrect ? b.border : '#ef444444'}`}}>{b.label}</span> : null;
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Actions */}
        <div style={{display:'flex',gap:16,justifyContent:'center'}}>
          <button className="btn-secondary" onClick={onRetry}>← Home Page</button>
          <button className="btn-primary" onClick={onLeaderboard}>View Leaderboard →</button>
        </div>
      </div>
    </div>
  );
}

// Leaderboard
function LeaderboardScreen({ player, onBack }) {
  const [entries, setEntries] = useState([]);

  useEffect(() => {
    let active = true;
    const load = async () => {
      const localRows = JSON.parse(localStorage.getItem(LOCAL_LEADERBOARD_KEY) || '[]');
      const cachedRemoteRows = getFreshRemoteLeaderboardCache();
      if(active && cachedRemoteRows.length) {
        const quickCombined = mergeLeaderboardRows([...localRows, ...cachedRemoteRows]).slice(0, 15);
        setEntries(quickCombined);
      }
      let remoteRows = [];
      try {
        remoteRows = await warmLeaderboardCache(200);
      } catch(err) {
        console.warn('Leaderboard fetch fallback to local only:', err);
      }
      if(!active) return;
      const combined = mergeLeaderboardRows([...localRows, ...(remoteRows.length ? remoteRows : cachedRemoteRows)]).slice(0, 15);
      setEntries(combined);
    };
    load();
    return () => { active = false; };
  }, []);

  const myRank = entries.findIndex(e => e.email === player.email) + 1;

  return (
    <div style={{minHeight:'100vh',position:'relative',zIndex:1,padding:32,display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{maxWidth:700,width:'100%',animation:'fadeIn .5s ease'}}>
        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-muted)',letterSpacing:'.2em',textTransform:'uppercase',marginBottom:12}}>Global Rankings</div>
          <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:36}}>🏆 Leaderboard</h2>
          {myRank > 0 && (
            <div style={{marginTop:12,display:'inline-block',background:'rgba(0,229,255,.1)',border:'1px solid rgba(0,229,255,.3)',color:'var(--accent)',fontFamily:'var(--font-mono)',fontSize:13,padding:'6px 16px',borderRadius:20}}>
              Your rank: #{myRank}
            </div>
          )}
        </div>

        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden',marginBottom:24}}>
          <div style={{
            display:'grid',gridTemplateColumns:'48px 1fr 80px 80px 80px',
            padding:'12px 20px',borderBottom:'1px solid var(--border)',
            fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.08em'
          }}>
            <div>Rank</div><div>Player</div><div style={{textAlign:'center'}}>Score</div>
            <div style={{textAlign:'center'}}>Level</div><div style={{textAlign:'center'}}>Date</div>
          </div>
          {entries.map((e, i) => {
            const isMe = e.email === player.email;
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
            return (
              <div key={i} style={{
                display:'grid',gridTemplateColumns:'48px 1fr 80px 80px 80px',
                padding:'14px 20px',
                borderBottom: i < entries.length - 1 ? '1px solid var(--border)' : 'none',
                background: isMe ? 'rgba(0,229,255,.06)' : 'transparent',
                borderLeft: isMe ? '3px solid var(--accent)' : '3px solid transparent',
                transition:'background .15s'
              }}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:14,display:'flex',alignItems:'center'}}>{medal}</div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{
                    width:30,height:30,borderRadius:'50%',
                    background:`rgba(0,229,255,.15)`,border:'1px solid rgba(0,229,255,.3)',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:12,fontWeight:700,color:'var(--accent)',fontFamily:'var(--font-mono)'
                  }}>{e.name[0]}</div>
                  <span style={{fontSize:14,fontWeight: isMe ? 700 : 400,color: isMe ? 'var(--accent)' : 'var(--text)'}}>{e.name} {isMe ? '(you)' : ''}</span>
                </div>
                <div style={{textAlign:'center',fontFamily:'var(--font-mono)',fontWeight:700,fontSize:15,color: i < 3 ? '#f59e0b' : 'var(--text)',display:'flex',alignItems:'center',justifyContent:'center'}}>{e.score}</div>
                <div style={{textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{
                    fontSize:10,padding:'2px 8px',borderRadius:20,fontFamily:'var(--font-mono)',
                    background: e.level==='high' ? 'rgba(239,68,68,.15)' : e.level==='medium' ? 'rgba(245,158,11,.15)' : 'rgba(16,185,129,.15)',
                    color: e.level==='high' ? '#ef4444' : e.level==='medium' ? '#f59e0b' : '#10b981',
                  }}>{e.level}</span>
                </div>
                <div style={{textAlign:'center',fontSize:12,color:'var(--text-muted)',display:'flex',alignItems:'center',justifyContent:'center'}}>{formatLeaderboardDate(e.date)}</div>
              </div>
            );
          })}
        </div>

        <div style={{display:'flex',gap:16,justifyContent:'center'}}>
          <button className="btn-secondary" onClick={onBack}>← Back to Dashboard</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('start');
  const [player, setPlayer] = useState(null);
  const [level, setLevel] = useState(null);
  const [results, setResults] = useState(null);
  const [datasets, setDatasets] = useState(DATASETS);
  const [unlockState, setUnlockState] = useState(getUnlockState(''));
  const [submissionStatus, setSubmissionStatus] = useState(null);

  useEffect(() => {
    let active = true;
    fetch('./Dataset.json')
      .then(r => {
        if(!r.ok) throw new Error(`Failed to load Dataset.json (${r.status})`);
        return r.json();
      })
      .then(rows => {
        if(!active) return;
        setDatasets(getDatasetsWithExternalFallback(rows));
      })
      .catch(err => {
        console.warn('Using built-in dataset fallback:', err);
        if(active) setDatasets(DATASETS);
      });
    return () => { active = false; };
  }, []);

  useEffect(() => {
    flushPendingSubmissions().catch(() => {});
  }, []);

  useEffect(() => {
    let active = true;
    warmLeaderboardCache(200)
      .then(rows => {
        if(active && Array.isArray(rows) && rows.length) setRemoteLeaderboardCache(rows);
      })
      .catch(() => {});
    return () => { active = false; };
  }, []);

  const handleStart = (p) => {
    setPlayer(p);
    setUnlockState(getUnlockState(p.email));
    setScreen('levels');
  };
  const handleViewLeaderboardFromStart = () => {
    if(!player) setPlayer({ name:'Guest', email:'' });
    setScreen('leaderboard');
  };
  const handleSelectLevel = (l) => {
    const currentUnlock = getUnlockState(player?.email);
    if(l === 'medium' && !currentUnlock.medium) return;
    if(l === 'high' && !currentUnlock.high) return;
    setLevel(l);
    setScreen('game');
  };
  const handleEnd = async (r) => {
    const current = getUserProgress(player?.email);
    const correct = Number(r?.correctFlags) || 0;
    const next = {
      lowCleared: current.lowCleared || 0,
      mediumCleared: current.mediumCleared || 0,
      highCleared: current.highCleared || 0,
    };
    if(level === 'low') next.lowCleared = Math.max(next.lowCleared, correct);
    if(level === 'medium') next.mediumCleared = Math.max(next.mediumCleared, correct);
    if(level === 'high') next.highCleared = Math.max(next.highCleared, correct);
    setUserProgress(player?.email, next);
    setUnlockState(getUnlockState(player?.email));

    const row = {
      name: player?.name || '',
      email: player?.email || '',
      score: Number(r?.score) || 0,
      level: level || 'low',
      date: toDateString(),
    };
    upsertLocalLeaderboard(row);
    setResults(r);
    setSubmissionStatus('syncing');
    setScreen('summary');

    let synced = await submitLeaderboardRow(row);
    if(level === 'high') {
      const pendingLeft = await flushPendingSubmissions();
      synced = synced || pendingLeft === 0;
    }
    setSubmissionStatus(synced ? 'success' : 'failed');
  };
  const handleRetry = () => {
    setLevel(null);
    setResults(null);
    setSubmissionStatus(null);
    setScreen('start');
  };
  const handleLeaderboard = () => setScreen('leaderboard');
  const handleBack = () => { setScreen(player?.email ? 'levels' : 'start'); };

  return (
    <>
      {screen === 'start' && <StartScreen onStart={handleStart} onViewLeaderboard={handleViewLeaderboardFromStart} />}
      {screen === 'levels' && <LevelSelect player={player} onSelectLevel={handleSelectLevel} datasets={datasets} unlockState={unlockState} />}
      {screen === 'game' && level && (
        <GameSession
          level={level}
          player={player}
          dataset={datasets[level]}
          onEnd={handleEnd}
        />
      )}
      {screen === 'summary' && results && (
        <SummaryScreen
          results={results}
          player={player}
          level={level}
          onRetry={handleRetry}
          onLeaderboard={handleLeaderboard}
          submissionStatus={submissionStatus}
        />
      )}
      {screen === 'leaderboard' && (
        <LeaderboardScreen
          player={player}
          onBack={handleBack}
        />
      )}
    </>
  );
}

warmLeaderboardCache(200).catch(() => {});
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
